name: Build & Deploy Devline

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/web/**"
      - "content/articles/**"
      - "deploy/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --workspace apps/web

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build
        run: npm run build:web

      - name: CSS size check
        run: node scripts/check-css-size.mjs

      - name: No raw hex in components
        run: node scripts/check-no-raw-hex.mjs

      - name: Brand ban check
        run: |
          if grep -rl "情长" apps/web/src apps/web/.next/server/app 2>/dev/null; then
            echo "构建产物或源码出现禁用品牌词"; exit 1
          fi
          echo "brand ban check OK"

  build:
    needs: checks
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/qingverse-web:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/workspace/my-learning-record

            # 拉取最新代码
            git fetch origin main
            git reset --hard origin/main

            cd deploy

            # 更新 WEB_TAG 为本次构建的 tag（API 已退役，无 API_TAG）
            sed -i "s/^WEB_TAG=.*/WEB_TAG=${{ needs.build.outputs.tag }}/" .env

            # 拉取新镜像并重启（只操作 web；goatcounter 不随部署重启）
            docker compose pull web
            docker compose up -d web
            docker compose restart caddy

            docker image prune -f
            echo "✅ Deployed tag=${{ needs.build.outputs.tag }}"
